---

- name: Create Reverse Proxy config for Zabbix
  copy:
    dest: /etc/nginx/sites-available/zabbix_proxy
    content: |
      # Redirect HTTP to HTTPS
      server {
          listen 80;
          server_name zabbix.{{ domain_name }};
          return 301 https://$host$request_uri;
      }

      # HTTPS Reverse Proxy
      server {
          listen 443 ssl;
          server_name zabbix.{{ domain_name }};

          ssl_certificate     /etc/nginx/ssl/zabbix.crt;
          ssl_certificate_key /etc/nginx/ssl/zabbix.key;

          location / {
              proxy_pass http://127.0.0.1:8080;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }

- name: Enable proxy configuration
  file:
    src: /etc/nginx/sites-available/zabbix_proxy
    dest: /etc/nginx/sites-enabled/zabbix_proxy
    state: link

- name: final restart
  service:
    name: nginx
    state: restarted
