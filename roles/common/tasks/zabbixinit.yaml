---
- name: Zabbix repo
  get_url:
    url: https://repo.zabbix.com/zabbix/7.4/release/debian/pool/main/z/zabbix-release/zabbix-release_latest_7.4+debian13_all.deb
    dest: /tmp/zabbix-release_7.4.deb

- name: installation dpkg
  apt:
    deb: /tmp/zabbix-release_7.4.deb
    state: present

- name: Cache apt
  apt:
    update_cache: yes

- name: Zabbix pkgs
  apt:
    name:
      - zabbix-server-pgsql
      - zabbix-frontend-php
      - php8.4-pgsql
      - zabbix-nginx-conf
      - zabbix-sql-scripts
      - zabbix-agent
      - postgresql
      - python3-psycopg2
    state: present
