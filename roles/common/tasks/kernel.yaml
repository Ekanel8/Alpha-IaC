---
- name: kernel defend options 1/2
  sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    reload: yes
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
    - net.ipv6.conf.lo.disable_ipv6
    - net.ipv4.conf.default.rp_filter #spooffing
    - kernel.dmesg_restrict # no user allowed to see kernel ptrs
    - kernel.yama.ptrace_scope # SYN-FLOOD
    - net.ipv4.icmp_echo_ignore_broadcasts #smurf

- name: kernel defender options 2/2
  sysctl:
    name: "{{ item }}"
    value: "0"
    state: present
    reload: yes
  loop:
    - net.ipv4.conf.default.accept_redirects #maninthemiddle
    - net.ipv4.conf.all.accept_redirects #ICMP
