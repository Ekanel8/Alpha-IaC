---
- name: Task-1
  hosts: all
  become: true

  vars:
    env_vars: "{{ lookup('file', '.env') | from_yaml }}"
    domain_name: "{{ env_vars.TARGET_DOMAIN }}"
    dns_ip_addr: "{{ env_vars.DNS_SERVER }}"

  tasks:

    - name: Ping servers
      ping:

    - name: Core pkgs installation
      apt:
        name:
          - iptables
          - htop
          - ntpsec
          - curl
          - wget
          - rsyslog
          - fail2ban
          - auditd
          - net-tools
          - dkms
          - linux-headers-amd64
          - build-essential
          - acl
        state: latest

    - name: Set local DNS server
      copy:
        dest: /etc/resolv.conf
        content: |
          nameserver {{ dns_ip_addr }}
          search {{ domain_name }}

    - name: ntpsec conf
      template:
        src: ntp.conf
        dest: /etc/ntpsec/ntp.conf

    - name: ntpsec restart
      service:
        name: ntpsec
        state: restarted

    - name: Set timezone
      timezone:
        name: Europe/Minsk

    - name: Create custom rsyslog configuration
      template:
        src: logs.conf
        dest: /etc/rsyslog.d/logs.conf

    - name: Restart rsyslog
      service:
        name: rsyslog
        state: restarted

    - name: Zabbix installation
      get_url:
        url: https://repo.zabbix.com/zabbix/7.4/release/debian/pool/main/z/zabbix-release/zabbix-release_latest_7.4+debian13_all.deb
        dest: /tmp/zabbix-release_7.4.deb

    - name: installation dpkg
      apt:
        deb: /tmp/zabbix-release_7.4.deb
        state: present

    - name: Cache apt
      apt:
        update_cache: yes

    - name: Zabbix pkgs extra
      apt:
        name:
          - zabbix-server-pgsql
          - zabbix-frontend-php
          - php8.4-pgsql
          - zabbix-nginx-conf
          - zabbix-sql-scripts
          - zabbix-agent
          - postgresql
          - python3-psycopg2
        state: present

    - name: DB user zabbix
      community.postgresql.postgresql_user:
        name: zabbix
        password: "{{ lookup('password', 'credentials/zabbix_password length=16
          chars=ascii_letters,digits') }}"
        state: present
      become_user: postgres

    - name: Create DB for zabbix
      community.postgresql.postgresql_db:
        name: zabbix
        owner: zabbix
        state: present
      become_user: postgres

    - name: Unpack server.sql.gz в /tmp
      shell: gunzip -c /usr/share/zabbix/sql-scripts/postgresql/server.sql.gz >
        /tmp/server.sql
      args:
        creates: /tmp/server.sql
      become: true

    - name: Check if Zabbix DB is empty
      community.postgresql.postgresql_query:
        login_db: zabbix
        query: "SELECT to_regclass('public.users');"
      register: zbx_check
      become_user: postgres

    - name: Import default PostgreSQL
      community.postgresql.postgresql_script:
        login_db: zabbix
        login_user: zabbix
        path: /tmp/server.sql
        encoding: UTF-8
      vars:
        ansible_remote_tmp: /tmp
      when: zbx_check.query_result[0].to_regclass is none
      become_user: zabbix

    - name: DBPassword
      replace:
        path: /etc/zabbix/zabbix_server.conf
        regexp: "^#?\\s*DBPassword=.*"
        replace: "DBPassword={{ lookup('password', 'credentials/zabbix_password
          length=16 chars=ascii_letters,digits') }}"

    - name: Enable listen localhost:8080 in Zabbix nginx config
      replace:
        path: /etc/zabbix/nginx.conf
        regexp: "^#\\s*listen\\s*8080\\s*;"
        replace: "listen 127.0.0.1:8080;"

    - name: Set server_name in Zabbix nginx config
      ansible.builtin.replace:
        path: /etc/zabbix/nginx.conf
        regexp: "^(\\s*)#\\s*server_name.*"
        replace: "\\1server_name zabix.{{ domain_name }};"

    - name: Restart Zabbix stack services
      service:
        name: "{{ item }}"
        state: restarted
      loop:
        - zabbix-server
        - zabbix-agent
        - nginx
        - php8.4-fpm
      become: true

    - name: Enable Zabbix stack services
      service:
        name: "{{ item }}"
        enabled: true
      loop:
        - zabbix-server
        - zabbix-agent
        - nginx
        - php8.4-fpm
      become: true

    - name: sisadmin user
      user:
        name: JohnDoe
        state: present
        shell: /bin/bash
        create_home: yes

    - name: Ensure group "admins" exists
      group:
        name: admins
        state: present

    - name: User to group
      user:
        name: JohnDoe
        groups: admins
        append: yes

    - name: User SSH gen
      authorized_key:
        user: JohnDoe
        state: present
        key: "{{ lookup('file', './ansible.pub') }}"

    - name: Change file ownership, group and permissions
      file:
        path: ~/.ssh
        owner: packer
        group: admins
        mode: "700"

    - name: Change file ownership, group and permissions
      file:
        path: /home/packer/.ssh/authorized_keys
        owner: packer
        group: admins
        mode: "600"

    - name: Permit root login
      replace:
        path: /etc/ssh/sshd_config
        regexp: "^#PermitRootLogin prohibit-password$"
        replace: "PermitRootLogin no"

    - name: SSH logs 1/2
      replace:
        path: /etc/ssh/sshd_config
        regexp: "^#SyslogFacility AUTH$"
        replace: "SyslogFacility AUTH"

    - name: SSH logs 2/2
      replace:
        path: /etc/ssh/sshd_config
        regexp: "^#LogLevel INFO$"
        replace: "LogLevel INFO"

    - name: fail2ban
      replace:
        path: /etc/fail2ban/jail.conf
        regexp: "^maxmatches = %(maxretry)s$"
        replace: "maxmatches = 5"

    - name: fail2ban [sshd]
      ini_file:
        path: /etc/fail2ban/jail.conf
        section: sshd
        option: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
      loop:
        - { key: "enabled", value: "true" }
        - { key: "port", value: "ssh" }
        - { key: "logpath", value: "%(sshd_log)s" }
        - { key: "maxretry", value: "5" }

    - name: enable fail2ban
      service:
        name: fail2ban
        enabled: true

    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted

    - name: kernel defend options 1/2
      sysctl:
        name: "{{ item }}"
        value: "1"
        state: present
        reload: yes
      loop:
        - net.ipv6.conf.all.disable_ipv6
        - net.ipv6.conf.default.disable_ipv6
        - net.ipv6.conf.lo.disable_ipv6
        - net.ipv4.conf.default.rp_filter #spooffing
        - kernel.dmesg_restrict # no user allowed to see kernel ptrs
        - kernel.yama.ptrace_scope # SYN-FLOOD
        - net.ipv4.icmp_echo_ignore_broadcasts #smurf

    - name: kernel defender options 2/2
      sysctl:
        name: "{{ item }}"
        value: "0"
        state: present
        reload: yes
      loop:
        - net.ipv4.conf.default.accept_redirects #maninthemiddle
        - net.ipv4.conf.all.accept_redirects #ICMP

    - name: Create directory for SSL
      file:
        path: /etc/nginx/ssl
        state: directory
        mode: "0755"

    - name: Generate self-signed TLS certificates
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout
        /etc/nginx/ssl/zabbix.key -out /etc/nginx/ssl/zabbix.crt -subj
        "/CN=zabbix.{{ domain_name }}"
      args:
        creates: /etc/nginx/ssl/zabbix.crt

    - name: Create Reverse Proxy config for Zabbix
      copy:
        dest: /etc/nginx/sites-available/zabbix_proxy
        content: |
          # Redirect HTTP to HTTPS
          server {
              listen 80;
              server_name zabbix.{{ domain_name }};
              return 301 https://$host$request_uri;
          }

          # HTTPS Reverse Proxy
          server {
              listen 443 ssl;
              server_name zabbix.{{ domain_name }};

              ssl_certificate     /etc/nginx/ssl/zabbix.crt;
              ssl_certificate_key /etc/nginx/ssl/zabbix.key;

              location / {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: Enable proxy configuration
      file:
        src: /etc/nginx/sites-available/zabbix_proxy
        dest: /etc/nginx/sites-enabled/zabbix_proxy
        state: link

    - name: final restart
      service:
        name: nginx
        state: restarted
...
